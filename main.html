<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHORDY.CORE | Systems Engineering V3</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #030303; 
            color: #f4f4f5;
            overflow-x: hidden;
        }
        .glass { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); }
        .video-card:hover { transform: translateY(-6px); box-shadow: 0 20px 40px -20px rgba(239, 68, 68, 0.4); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        .active-tab { background: linear-gradient(to right, rgba(239, 68, 68, 0.2), transparent); border-left: 4px solid #ef4444; color: #fff; }
        
        @keyframes pulse-red {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .status-pulse { animation: pulse-red 2s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // INSTANCIAS ACTUALIZADAS 2026 - Seleccionadas por estabilidad y bypass de Error 153
        const SERVERS = [
            { name: "Piped Rivo", url: "https://pipedapi.rivo.me", type: "piped" },
            { name: "Piped Kavin", url: "https://pipedapi.kavin.rocks", type: "piped" },
            { name: "Invidious Nerdy", url: "https://inv.nrd.li", type: "invidious" },
            { name: "Piped Segfault", url: "https://api.piped.projectsegfau.lt", type: "piped" },
            { name: "Invidious US", url: "https://invidious.snopyta.org", type: "invidious" }
        ];

        const CATEGORIES = ["Recientes", "Ingeniería", "Música", "DevOps", "AI", "Gaming", "Lo-fi"];

        const App = () => {
            const [videos, setVideos] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchQuery, setSearchQuery] = useState("");
            const [selectedVideo, setSelectedVideo] = useState(null);
            const [activeServer, setActiveServer] = useState(SERVERS[0]);
            const [logs, setLogs] = useState([]);
            const [errorCount, setErrorCount] = useState(0);

            const addLog = (msg, type = "info") => {
                const time = new Date().toLocaleTimeString();
                setLogs(prev => [{ time, msg, type }, ...prev].slice(0, 6));
            };

            const fetchContent = useCallback(async (endpoint = 'trending') => {
                setLoading(true);
                let success = false;
                
                addLog("Iniciando Handshake V3...");

                // Intentar con todos los servidores disponibles
                for (let i = 0; i < SERVERS.length; i++) {
                    const server = SERVERS[i];
                    try {
                        addLog(`Conectando: ${server.name}...`);
                        
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => controller.abort(), 5000);

                        const apiPath = server.type === 'invidious' 
                            ? `${server.url}/api/v1/${endpoint === 'trending' ? 'trending?region=EC' : endpoint}`
                            : `${server.url}/${endpoint === 'trending' ? 'trending?region=EC' : endpoint}`;

                        const response = await fetch(apiPath, { 
                            method: 'GET',
                            signal: controller.signal
                        });
                        
                        clearTimeout(timeoutId);

                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        
                        const data = await response.json();
                        let normalized = [];
                        
                        if (server.type === 'invidious') {
                            normalized = data.map(v => ({
                                id: v.videoId,
                                title: v.title,
                                author: v.author,
                                thumb: v.videoThumbnails?.find(t => t.quality === 'medium')?.url || `https://img.youtube.com/vi/${v.videoId}/mqdefault.jpg`,
                                views: v.viewCountText || v.viewCount?.toLocaleString() || "N/A",
                                date: v.publishedText
                            }));
                        } else {
                            const items = data.items || data;
                            normalized = items.map(v => ({
                                id: v.videoId || v.url?.split("v=")[1],
                                title: v.title,
                                author: v.uploaderName || v.uploader,
                                thumb: v.thumbnail || `https://img.youtube.com/vi/${v.videoId}/mqdefault.jpg`,
                                views: v.views?.toLocaleString() || "Reciente",
                                date: v.uploadedDate
                            }));
                        }

                        if (normalized && normalized.length > 0) {
                            setVideos(normalized);
                            setActiveServer(server);
                            addLog(`${server.name} ONLINE`, "success");
                            success = true;
                            break;
                        }
                    } catch (e) {
                        addLog(`Fallo: ${server.name}`, "error");
                    }
                }

                if (!success) {
                    addLog("CRÍTICO: Sin respuesta de APIs.", "error");
                    setErrorCount(prev => prev + 1);
                }
                setLoading(false);
                setTimeout(() => window.lucide.createIcons(), 200);
            }, []);

            useEffect(() => {
                fetchContent();
            }, [fetchContent]);

            const handleSearch = (e) => {
                e.preventDefault();
                if (!searchQuery.trim()) return;
                fetchContent(`search?q=${encodeURIComponent(searchQuery)}&filter=videos`);
            };

            return (
                <div className="flex min-h-screen bg-[#030303]">
                    {/* SIDEBAR */}
                    <aside className="w-72 border-r border-white/5 hidden xl:flex flex-col fixed h-full bg-[#030303] z-50">
                        <div className="p-8 mb-4 flex items-center gap-4">
                            <div className="w-12 h-12 bg-red-600 rounded-2xl flex items-center justify-center shadow-[0_0_30px_rgba(239,68,68,0.5)] rotate-3">
                                <i data-lucide="zap" className="text-white w-7 h-7 fill-current"></i>
                            </div>
                            <div>
                                <h1 className="font-black tracking-tighter text-2xl leading-none">SHORDY</h1>
                                <p className="text-[10px] font-bold text-red-500 tracking-[0.3em] mt-1 uppercase">Core Engine V3</p>
                            </div>
                        </div>
                        
                        <nav className="flex-1 px-4 space-y-2">
                            <NavItem icon="layout-grid" label="Dashboard" active={true} onClick={() => fetchContent('trending')} />
                            <NavItem icon="flame" label="Tendencias" onClick={() => fetchContent('trending')} />
                            <NavItem icon="radio" label="En Vivo" />
                            <div className="my-6 border-t border-white/5 mx-4"></div>
                            <NavItem icon="folder-kanban" label="Proyectos" />
                            <NavItem icon="terminal" label="Consola API" />
                        </nav>

                        <div className="p-6 m-6 bg-zinc-900/40 rounded-[2rem] border border-white/5 backdrop-blur-md">
                            <div className="flex items-center justify-between mb-4">
                                <span className="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Network Monitor</span>
                                <div className="flex gap-1">
                                    <div className="w-1 h-1 rounded-full bg-red-500 status-pulse"></div>
                                    <div className="w-1 h-1 rounded-full bg-red-500 status-pulse" style={{animationDelay: '0.2s'}}></div>
                                </div>
                            </div>
                            <div className="space-y-2 font-mono text-[9px]">
                                {logs.map((l, i) => (
                                    <p key={i} className={`truncate ${l.type === 'error' ? 'text-red-400' : l.type === 'success' ? 'text-emerald-400' : 'text-zinc-500'}`}>
                                        <span className="opacity-30">[{l.time.split(':')[2]}]</span> {l.msg}
                                    </p>
                                ))}
                            </div>
                            <button 
                                onClick={() => fetchContent()}
                                className="w-full mt-4 py-2 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl text-[10px] font-bold uppercase transition-all"
                            >
                                Reconnect System
                            </button>
                        </div>
                    </aside>

                    {/* MAIN AREA */}
                    <main className="flex-1 xl:ml-72 relative">
                        {/* HEADER */}
                        <header className="sticky top-0 h-20 glass z-40 flex items-center justify-between px-10 border-b border-white/5">
                            <div className="flex-1 max-w-3xl">
                                <form onSubmit={handleSearch} className="relative group">
                                    <i data-lucide="search" className="absolute left-5 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-600 group-focus-within:text-red-500 transition-colors"></i>
                                    <input 
                                        type="text" 
                                        placeholder="Sincronizar búsqueda con el backend..." 
                                        className="w-full bg-zinc-900/40 border border-white/10 rounded-2xl py-3 pl-14 pr-6 outline-none focus:ring-2 focus:ring-red-600/20 focus:bg-zinc-900/80 transition-all text-sm font-medium"
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                    />
                                </form>
                            </div>
                            <div className="flex items-center gap-6 ml-6">
                                <div className="hidden md:flex flex-col items-end">
                                    <span className="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Active Server</span>
                                    <span className="text-xs font-bold text-white">{activeServer.name}</span>
                                </div>
                                <div className="w-11 h-11 rounded-2xl bg-gradient-to-br from-zinc-800 to-zinc-900 border border-white/10 flex items-center justify-center font-black text-red-600 shadow-xl">S</div>
                            </div>
                        </header>

                        {/* CATEGORIES */}
                        <div className="px-10 py-6 flex gap-4 overflow-x-auto custom-scrollbar no-scrollbar">
                            {CATEGORIES.map(c => (
                                <button key={c} className="px-6 py-2 rounded-2xl bg-zinc-900/60 border border-white/5 text-[11px] font-black uppercase tracking-widest hover:bg-red-600 hover:text-white transition-all whitespace-nowrap">
                                    {c}
                                </button>
                            ))}
                        </div>

                        {/* CONTENT AREA */}
                        <div className="px-10 pb-20">
                            {selectedVideo && (
                                <div className="mb-16 animate-in fade-in slide-in-from-bottom-8 duration-700">
                                    <div className="aspect-video w-full rounded-[3rem] overflow-hidden bg-black border border-white/10 shadow-[0_50px_100px_-20px_rgba(0,0,0,1)] relative">
                                        <iframe 
                                            src={activeServer.type === 'piped' 
                                                ? `${activeServer.url.replace('api.', '')}/embed/${selectedVideo.id}`
                                                : `${activeServer.url}/embed/${selectedVideo.id}?dark_mode=true&autoplay=1`
                                            }
                                            className="w-full h-full"
                                            frameBorder="0"
                                            allowFullScreen
                                        />
                                    </div>
                                    <div className="mt-10 flex flex-col md:flex-row justify-between items-start gap-8">
                                        <div className="max-w-4xl space-y-4">
                                            <h1 className="text-4xl font-black tracking-tight leading-tight text-white">{selectedVideo.title}</h1>
                                            <div className="flex items-center gap-5 pt-2">
                                                <div className="w-14 h-14 rounded-[1.5rem] bg-red-600 flex items-center justify-center font-black text-2xl text-white shadow-lg">
                                                    {selectedVideo.author?.[0] || 'Y'}
                                                </div>
                                                <div>
                                                    <p className="font-black text-lg flex items-center gap-2 tracking-tight">
                                                        {selectedVideo.author}
                                                        <i data-lucide="check-circle-2" className="w-5 h-5 text-red-500 fill-current"></i>
                                                    </p>
                                                    <p className="text-xs text-zinc-500 font-bold uppercase tracking-widest">Sistemas Engineering Verified</p>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="flex gap-3">
                                            <button className="px-8 py-4 bg-white text-black rounded-3xl font-black text-xs uppercase tracking-widest hover:scale-105 transition-all">Download</button>
                                            <button className="px-8 py-4 bg-zinc-900 border border-white/10 rounded-3xl font-black text-xs uppercase tracking-widest hover:bg-zinc-800 transition-all">Source</button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            <div className="flex items-center justify-between mb-10">
                                <h2 className="text-3xl font-black tracking-tighter uppercase flex items-center gap-4">
                                    <span className="w-3 h-10 bg-red-600 rounded-full shadow-[0_0_20px_rgba(239,68,68,0.5)]"></span>
                                    Core Stream Feed
                                </h2>
                                <button onClick={() => fetchContent()} className="p-3 bg-zinc-900 border border-white/10 rounded-2xl hover:bg-zinc-800 transition-all group">
                                    <i data-lucide="rotate-cw" className={`w-5 h-5 group-hover:rotate-180 transition-all duration-500 ${loading ? 'animate-spin' : ''}`}></i>
                                </button>
                            </div>

                            <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-10">
                                {loading ? (
                                    [...Array(8)].map((_, i) => (
                                        <div key={i} className="space-y-6">
                                            <div className="aspect-video bg-zinc-900 rounded-[2.5rem] animate-pulse"></div>
                                            <div className="space-y-3">
                                                <div className="h-5 bg-zinc-900 rounded-full w-full animate-pulse"></div>
                                                <div className="h-3 bg-zinc-900 rounded-full w-2/3 animate-pulse"></div>
                                            </div>
                                        </div>
                                    ))
                                ) : videos.length > 0 ? (
                                    videos.map((v, i) => (
                                        <div 
                                            key={v.id + i} 
                                            className="video-card group cursor-pointer space-y-5 transition-all duration-500" 
                                            onClick={() => { setSelectedVideo(v); window.scrollTo({top: 0, behavior: 'smooth'}); }}
                                        >
                                            <div className="relative aspect-video rounded-[2.5rem] overflow-hidden border border-white/5 bg-zinc-900 shadow-2xl">
                                                <img src={v.thumb} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000 group-hover:opacity-20" loading="lazy" />
                                                <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all duration-500">
                                                    <div className="w-16 h-16 bg-red-600 rounded-3xl flex items-center justify-center shadow-[0_0_40px_rgba(239,68,68,0.6)] rotate-12 group-hover:rotate-0 transition-all duration-500">
                                                        <i data-lucide="play" className="text-white w-8 h-8 fill-current translate-x-0.5"></i>
                                                    </div>
                                                </div>
                                                <div className="absolute top-4 left-4 bg-black/60 backdrop-blur-md px-3 py-1 rounded-xl text-[9px] font-black border border-white/5 uppercase tracking-[0.2em]">
                                                    4K / 60FPS
                                                </div>
                                            </div>
                                            <div className="px-3 space-y-2">
                                                <h3 className="text-sm font-black line-clamp-2 leading-tight group-hover:text-red-500 transition-colors uppercase tracking-tight">{v.title}</h3>
                                                <div className="flex items-center gap-3 text-[10px] font-black text-zinc-600 uppercase tracking-widest">
                                                    <span className="truncate max-w-[120px]">{v.author}</span>
                                                    <span className="w-1 h-1 bg-zinc-800 rounded-full"></span>
                                                    <span className="flex-shrink-0 text-zinc-500">{v.views} vistas</span>
                                                </div>
                                            </div>
                                        </div>
                                    ))
                                ) : (
                                    <div className="col-span-full py-40 text-center space-y-6">
                                        <div className="w-20 h-20 bg-zinc-900 rounded-full flex items-center justify-center mx-auto border border-white/5">
                                            <i data-lucide="cloud-off" className="text-zinc-700 w-10 h-10"></i>
                                        </div>
                                        <div>
                                            <p className="text-zinc-500 font-black uppercase tracking-[0.3em] mb-2 text-sm">Offline Core</p>
                                            <p className="text-xs text-zinc-700 max-w-xs mx-auto">El handshake con los servidores de ingeniería falló. Intenta reconectar el sistema.</p>
                                        </div>
                                        <button onClick={() => fetchContent()} className="px-10 py-4 bg-red-600 text-white rounded-3xl font-black text-xs uppercase tracking-widest shadow-xl shadow-red-600/20">Reiniciar Handshake</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const NavItem = ({ icon, label, active, onClick }) => (
            <div 
                onClick={onClick}
                className={`flex items-center gap-4 px-6 py-4 rounded-[1.5rem] cursor-pointer transition-all group ${active ? 'active-tab shadow-2xl' : 'text-zinc-600 hover:text-white hover:bg-zinc-900/40'}`}
            >
                <i data-lucide={icon} className={`w-5 h-5 ${active ? 'text-red-500' : 'group-hover:text-red-400'}`}></i>
                <span className="text-[11px] font-black uppercase tracking-[0.2em]">{label}</span>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
